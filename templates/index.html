<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestInsight Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-shell">
    <section class="hero-card">
        <div>
            <div class="eyebrow">NestInsight</div>
            <h1 class="hero-title">Upload your CSV dataset</h1>
            <p class="hero-copy">
                Upload your dataset, choose the target column, and generate analysis instantly.
            </p>
        </div>

        <aside class="upload-panel">

            {% if error_message %}
            <div class="error-banner">{{ error_message }}</div>
            {% endif %}

            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="upload-box">
                    <label for="file">CSV file</label>
                    <input id="file" type="file" name="file" accept=".csv" required>
                </div>

                <div class="upload-box">
                    <label for="target_column">Target column</label>
                    <select id="target_column" name="target_column" required disabled>
                        <option value="">Upload CSV first</option>
                    </select>
                </div>

                <button type="submit">Analyze Dataset</button>
            </form>

        </aside>
    </section>
</div>

<script>
const fileInput = document.getElementById('file');
const targetSelect = document.getElementById('target_column');

fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        const text = event.target.result;
        const firstLine = text.split(/\r?\n/)[0];
        const columns = firstLine.split(',');

        targetSelect.innerHTML = '<option value="">Select Target</option>';

        columns.forEach((col) => {
            const option = document.createElement('option');
            option.value = col.trim();
            option.textContent = col.trim();
            targetSelect.appendChild(option);
        });

        targetSelect.disabled = false;
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
